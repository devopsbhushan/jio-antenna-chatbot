name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Install Gradle 8.4 and generate wrapper ──────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew
          echo "Gradle wrapper generated"
          ls -la gradlew

      # ── Cache Gradle dependencies ─────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-

      # ── Inject S3 URL if secret is set ───────────────────────────────────
      - name: Inject Chatbot URL
        run: |
          if [ -n "${{ secrets.CHATBOT_URL }}" ]; then
            sed -i 's|https://chatbot-input-database.s3.ap-south-1.amazonaws.com/ui/index.html|${{ secrets.CHATBOT_URL }}|g' \
              android/app/src/main/java/com/jio/antennachatbot/MainActivity.kt
            echo "URL injected: ${{ secrets.CHATBOT_URL }}"
          else
            echo "No CHATBOT_URL secret — using hardcoded URL in MainActivity.kt"
          fi

      # ── Build debug APK (simpler, no signing config needed) ──────────────
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          echo "--- Build output ---"
          find . -name "*.apk" 2>/dev/null
          ls -lh app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug APK found"

      # ── Rename APK ────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          APK_SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          APK_DST="android/app/build/outputs/apk/debug/JioAntennaChatbot_v1_${DATE}.apk"
          cp "$APK_SRC" "$APK_DST"
          echo "APK_NAME=JioAntennaChatbot_v1_${DATE}.apk" >> $GITHUB_ENV
          echo "APK_PATH=$APK_DST" >> $GITHUB_ENV
          ls -lh "$APK_DST"

      # ── Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Summary
        run: |
          echo "========================================"
          echo "APK BUILD COMPLETE ✅"
          echo "File: ${{ env.APK_NAME }}"
          echo ""
          echo "Download:"
          echo "  GitHub → Actions → this run → Artifacts"
          echo ""
          echo "Install on Android:"
          echo "  1. Send APK to phone via WhatsApp/email"
          echo "  2. Settings → Install unknown apps → Allow"
          echo "  3. Tap APK → Install"
          echo "========================================"
