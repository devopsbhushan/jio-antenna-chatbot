name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Generate app icons (Jio red with antenna emoji) ──────────────────
      - name: Generate app icons
        run: |
          pip install Pillow --quiet

          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import os

          sizes = {
              "mipmap-mdpi":    48,
              "mipmap-hdpi":    72,
              "mipmap-xhdpi":   96,
              "mipmap-xxhdpi":  144,
              "mipmap-xxxhdpi": 192,
          }

          base = "android/app/src/main/res"

          for folder, size in sizes.items():
              os.makedirs(f"{base}/{folder}", exist_ok=True)

              # Square icon (ic_launcher)
              img = Image.new("RGB", (size, size), color=(213, 0, 0))  # Jio red
              draw = ImageDraw.Draw(img)
              # Draw white circle in center
              margin = size // 6
              draw.ellipse([margin, margin, size - margin, size - margin],
                           fill=(255, 255, 255))
              # Draw red antenna symbol (simplified)
              cx, cy = size // 2, size // 2
              r = size // 5
              draw.arc([cx-r, cy-r, cx+r, cy+r], start=210, end=330,
                       fill=(213, 0, 0), width=max(2, size//20))
              outer = size // 3
              draw.arc([cx-outer, cy-outer, cx+outer, cy+outer], start=210, end=330,
                       fill=(213, 0, 0), width=max(2, size//20))
              draw.line([cx, cy, cx, cy + r + size//10],
                        fill=(213, 0, 0), width=max(2, size//20))

              img.save(f"{base}/{folder}/ic_launcher.png")

              # Round icon (ic_launcher_round) — circle crop
              img_round = Image.new("RGBA", (size, size), (0, 0, 0, 0))
              mask = Image.new("L", (size, size), 0)
              mask_draw = ImageDraw.Draw(mask)
              mask_draw.ellipse([0, 0, size, size], fill=255)
              img_round.paste(img, mask=mask)
              img_round.save(f"{base}/{folder}/ic_launcher_round.png")

              print(f"Generated {folder}: {size}x{size}px")

          print("All icons generated successfully")
          PYEOF

      # ── Setup Gradle ──────────────────────────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew
          echo "Gradle wrapper ready"

      # ── Cache ─────────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-

      # ── Inject S3 URL ─────────────────────────────────────────────────────
      - name: Inject Chatbot URL
        run: |
          if [ -n "${{ secrets.CHATBOT_URL }}" ]; then
            sed -i 's|https://chatbot-input-database.s3.ap-south-1.amazonaws.com/ui/index.html|${{ secrets.CHATBOT_URL }}|g' \
              android/app/src/main/java/com/jio/antennachatbot/MainActivity.kt
            echo "URL injected: ${{ secrets.CHATBOT_URL }}"
          else
            echo "Using hardcoded URL in MainActivity.kt"
          fi

      # ── Build APK ─────────────────────────────────────────────────────────
      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          echo "--- APK output ---"
          find . -name "*.apk" 2>/dev/null
          ls -lh app/build/outputs/apk/debug/ 2>/dev/null

      # ── Rename APK ────────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          DST="android/app/build/outputs/apk/debug/JioAntennaChatbot_v1_${DATE}.apk"
          cp "$SRC" "$DST"
          echo "APK_NAME=JioAntennaChatbot_v1_${DATE}.apk" >> $GITHUB_ENV
          echo "APK_PATH=$DST" >> $GITHUB_ENV
          ls -lh "$DST"

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Summary
        run: |
          echo "========================================"
          echo "✅ APK BUILD COMPLETE"
          echo "File: ${{ env.APK_NAME }}"
          echo "Download: GitHub → Actions → this run → Artifacts"
          echo ""
          echo "Install:"
          echo "  1. Send APK to phone (WhatsApp/email)"
          echo "  2. Settings → Install unknown apps → Allow"
          echo "  3. Tap APK → Install"
          echo "========================================"
