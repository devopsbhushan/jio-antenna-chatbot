name: Build Android APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/**'
      - 'generate_icons.py'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate app icons
        run: |
          pip install Pillow --break-system-packages -q 2>/dev/null || pip install Pillow -q
          python3 generate_icons.py

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Generate Gradle wrapper
        run: |
          cd android
          gradle wrapper --gradle-version 8.4 --distribution-type bin
          chmod +x gradlew
          echo "Gradle wrapper ready"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle.properties') }}
          restore-keys: gradle-

      - name: Inject Chatbot URL
        run: |
          if [ -n "${{ secrets.CHATBOT_URL }}" ]; then
            sed -i 's|https://chatbot-input-database.s3.ap-south-1.amazonaws.com/ui/index.html|${{ secrets.CHATBOT_URL }}|g' \
              android/app/src/main/java/com/jio/antennachatbot/MainActivity.kt
            echo "URL injected"
          else
            echo "Using hardcoded URL in MainActivity.kt"
          fi

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon 2>&1
          find . -name "*.apk" 2>/dev/null
          ls -lh app/build/outputs/apk/debug/ 2>/dev/null

      - name: Rename APK
        run: |
          DATE=$(date +%Y%m%d)
          SRC="android/app/build/outputs/apk/debug/app-debug.apk"
          DST="android/app/build/outputs/apk/debug/JioAntennaChatbot_v1_${DATE}.apk"
          cp "$SRC" "$DST"
          echo "APK_NAME=JioAntennaChatbot_v1_${DATE}.apk" >> $GITHUB_ENV
          echo "APK_PATH=$DST" >> $GITHUB_ENV
          ls -lh "$DST"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APK_NAME }}
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Summary
        run: |
          echo "========================================"
          echo "APK BUILD COMPLETE"
          echo "File: ${{ env.APK_NAME }}"
          echo "Download: GitHub -> Actions -> this run -> Artifacts"
          echo "Install: Send APK to phone -> Settings -> Unknown apps -> Allow -> Install"
          echo "========================================"
