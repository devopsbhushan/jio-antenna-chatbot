name: Deploy Lambda (Docker)

on:
  workflow_dispatch:

env:
  AWS_REGION:       ${{ secrets.AWS_REGION }}
  ECR_REPO_CHAT:    antenna-chatbot
  ECR_REPO_FAISS:   antenna-faiss-index
  LAMBDA_CHAT:      antenna-chatbot_Lambda
  LAMBDA_FAISS:     Build_FAISS_Index

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # ── ECR: create repos if they don't exist ──────────────────────────────
      - name: Ensure ECR repos exist
        run: |
          aws ecr describe-repositories --repository-names antenna-chatbot --no-cli-pager 2>/dev/null ||           aws ecr create-repository --repository-name antenna-chatbot             --image-scanning-configuration scanOnPush=false             --image-tag-mutability MUTABLE --no-cli-pager

          aws ecr describe-repositories --repository-names antenna-faiss-index --no-cli-pager 2>/dev/null ||           aws ecr create-repository --repository-name antenna-faiss-index             --image-scanning-configuration scanOnPush=false             --image-tag-mutability MUTABLE --no-cli-pager

          echo "ECR repos ready"

      # ── ECR login ──────────────────────────────────────────────────────────
      - name: Login to ECR
        id: ecr_login
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "account=$ACCOUNT" >> $GITHUB_OUTPUT
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} |           docker login --username AWS --password-stdin             ${ACCOUNT}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          echo "ECR_BASE=${ACCOUNT}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com" >> $GITHUB_ENV

      # ── DELETE old images before pushing new ones (avoid ECR storage charges) ──
      - name: Delete old ECR images
        run: |
          for REPO in antenna-chatbot antenna-faiss-index; do
            echo "Cleaning $REPO..."
            DIGESTS=$(aws ecr list-images --repository-name $REPO               --query 'imageIds[*]' --output json 2>/dev/null || echo "[]")
            COUNT=$(echo $DIGESTS | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
            if [ "$COUNT" -gt "0" ]; then
              aws ecr batch-delete-image --repository-name $REPO                 --image-ids "$DIGESTS" --no-cli-pager
              echo "  Deleted $COUNT old image(s) from $REPO"
            else
              echo "  $REPO is already empty"
            fi
          done

      # ── Build chatbot image ────────────────────────────────────────────────
      - name: Build chatbot Docker image
        run: |
          cat > Dockerfile.chatbot << 'EOF'
          FROM public.ecr.aws/lambda/python:3.11
          RUN pip install --no-cache-dir               boto3==1.34.0               numpy==1.24.4               faiss-cpu==1.7.4               langchain==0.1.20               langchain-community==0.0.38               groq==0.9.0
          COPY chatbot_lambda.py ${LAMBDA_TASK_ROOT}/lambda_function.py
          CMD ["lambda_function.lambda_handler"]
          EOF
          docker build -f Dockerfile.chatbot -t antenna-chatbot:latest .
          echo "Chatbot image built"

      # ── Build FAISS index image ────────────────────────────────────────────
      - name: Build FAISS index Docker image
        run: |
          cat > Dockerfile.faiss << 'EOF'
          FROM public.ecr.aws/lambda/python:3.11
          RUN pip install --no-cache-dir               boto3==1.34.0               numpy==1.24.4               faiss-cpu==1.7.4
          COPY build_index_lambda.py ${LAMBDA_TASK_ROOT}/lambda_function.py
          CMD ["lambda_function.lambda_handler"]
          EOF
          docker build -f Dockerfile.faiss -t antenna-faiss-index:latest .
          echo "FAISS index image built"

      # ── Push both images to ECR ────────────────────────────────────────────
      - name: Push images to ECR
        run: |
          docker tag antenna-chatbot:latest             ${{ env.ECR_BASE }}/antenna-chatbot:latest
          docker push ${{ env.ECR_BASE }}/antenna-chatbot:latest

          docker tag antenna-faiss-index:latest             ${{ env.ECR_BASE }}/antenna-faiss-index:latest
          docker push ${{ env.ECR_BASE }}/antenna-faiss-index:latest

          echo "Images pushed to ECR"

      # ── Get Lambda execution role from existing function ───────────────────
      - name: Get Lambda role ARN
        id: role
        run: |
          ROLE=$(aws lambda get-function-configuration             --function-name ${{ env.LAMBDA_FAISS }}             --query Role --output text 2>/dev/null ||           aws lambda get-function-configuration             --function-name ${{ env.LAMBDA_CHAT }}             --query Role --output text 2>/dev/null || echo "")
          echo "arn=$ROLE" >> $GITHUB_OUTPUT
          echo "Role: $ROLE"

      # ── Deploy chatbot Lambda ──────────────────────────────────────────────
      - name: Deploy antenna-chatbot_Lambda (container)
        run: |
          IMAGE_URI=${{ env.ECR_BASE }}/antenna-chatbot:latest
          ROLE=${{ steps.role.outputs.arn }}
          PKG_TYPE=$(aws lambda get-function-configuration --function-name ${{ env.LAMBDA_CHAT }} --query PackageType --output text 2>/dev/null || echo "NOT_FOUND")
          echo "Existing package type: $PKG_TYPE"
          if [ "$PKG_TYPE" = "Zip" ]; then
            echo "Deleting Zip-type function, recreating as Image-type..."
            aws lambda delete-function --function-name ${{ env.LAMBDA_CHAT }} --no-cli-pager
            sleep 10
            PKG_TYPE="NOT_FOUND"
          fi
          if [ "$PKG_TYPE" = "NOT_FOUND" ]; then
            echo "Creating ${{ env.LAMBDA_CHAT }} as Image-type..."
            aws lambda create-function --function-name ${{ env.LAMBDA_CHAT }} --package-type Image --code ImageUri=$IMAGE_URI --role $ROLE --timeout 30 --memory-size 1024 --environment "Variables={BUCKET=${{ secrets.S3_BUCKET }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}}" --no-cli-pager
          else
            echo "Updating Image-type ${{ env.LAMBDA_CHAT }}..."
            aws lambda update-function-code --function-name ${{ env.LAMBDA_CHAT }} --image-uri $IMAGE_URI --no-cli-pager
            aws lambda wait function-updated --function-name ${{ env.LAMBDA_CHAT }}
            aws lambda update-function-configuration --function-name ${{ env.LAMBDA_CHAT }} --timeout 30 --memory-size 1024 --environment "Variables={BUCKET=${{ secrets.S3_BUCKET }},GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}}" --no-cli-pager
          fi
          aws lambda wait function-updated --function-name ${{ env.LAMBDA_CHAT }}
          echo "${{ env.LAMBDA_CHAT }} deployed as Image-type"

      # ── Deploy FAISS index Lambda ──────────────────────────────────────────
      - name: Deploy Build_FAISS_Index (container)
        run: |
          IMAGE_URI=${{ env.ECR_BASE }}/antenna-faiss-index:latest
          ROLE=${{ steps.role.outputs.arn }}
          PKG_TYPE=$(aws lambda get-function-configuration --function-name ${{ env.LAMBDA_FAISS }} --query PackageType --output text 2>/dev/null || echo "NOT_FOUND")
          echo "Existing package type: $PKG_TYPE"
          if [ "$PKG_TYPE" = "Zip" ]; then
            echo "Deleting Zip-type function, recreating as Image-type..."
            aws lambda delete-function --function-name ${{ env.LAMBDA_FAISS }} --no-cli-pager
            sleep 10
            PKG_TYPE="NOT_FOUND"
          fi
          if [ "$PKG_TYPE" = "NOT_FOUND" ]; then
            echo "Creating ${{ env.LAMBDA_FAISS }} as Image-type..."
            aws lambda create-function --function-name ${{ env.LAMBDA_FAISS }} --package-type Image --code ImageUri=$IMAGE_URI --role $ROLE --timeout 900 --memory-size 3008 --environment "Variables={BUCKET=${{ secrets.S3_BUCKET }}}" --no-cli-pager
          else
            echo "Updating Image-type ${{ env.LAMBDA_FAISS }}..."
            aws lambda update-function-code --function-name ${{ env.LAMBDA_FAISS }} --image-uri $IMAGE_URI --no-cli-pager
            aws lambda wait function-updated --function-name ${{ env.LAMBDA_FAISS }}
            aws lambda update-function-configuration --function-name ${{ env.LAMBDA_FAISS }} --timeout 900 --memory-size 3008 --environment "Variables={BUCKET=${{ secrets.S3_BUCKET }}}" --no-cli-pager
          fi
          aws lambda wait function-updated --function-name ${{ env.LAMBDA_FAISS }}
          echo "${{ env.LAMBDA_FAISS }} deployed as Image-type"

      # ── Clean up old layer versions (free up Lambda storage) ──────────────
      - name: Delete old Lambda layers
        run: |
          for LAYER in rag-numpy-faiss; do
            VERSIONS=$(aws lambda list-layer-versions --layer-name $LAYER               --query 'LayerVersions[*].Version' --output text 2>/dev/null || echo "")
            for VER in $VERSIONS; do
              aws lambda delete-layer-version --layer-name $LAYER --version-number $VER --no-cli-pager 2>/dev/null || true
              echo "Deleted layer $LAYER v$VER"
            done
          done
          echo "Old layers cleaned"

      # ── Remove layers from Lambda functions (no longer needed) ────────────
      - name: Remove layers from Lambda functions
        run: |
          for FN in ${{ env.LAMBDA_CHAT }} ${{ env.LAMBDA_FAISS }}; do
            aws lambda update-function-configuration               --function-name $FN --layers --no-cli-pager 2>/dev/null || true
            aws lambda wait function-updated --function-name $FN 2>/dev/null || true
            echo "Layers removed from $FN"
          done

      # ── Summary ───────────────────────────────────────────────────────────
      - name: Summary
        run: |
          echo "================================================"
          echo "DOCKER DEPLOYMENT COMPLETE"
          echo "ECR base: ${{ env.ECR_BASE }}"
          echo ""
          echo "Images deployed:"
          echo "  antenna-chatbot:latest      -> ${{ env.LAMBDA_CHAT }}"
          echo "  antenna-faiss-index:latest  -> ${{ env.LAMBDA_FAISS }}"
          echo ""
          echo "Old images deleted from ECR (zero storage cost)"
          echo "Old Lambda layers deleted"
          echo ""
          echo "Next steps:"
          echo "  1. Build_FAISS_Index -> Test -> {}  (wait ~15 min)"
          echo "  2. antenna-chatbot_Lambda -> ping test"
          echo "================================================"
